[build]
  command = "pnpm install && pnpm build"
  publish = "dist/public"
  functions = "dist/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/netlify/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "lightningcss", "esbuild"]

[dev]
  command = "pnpm dev"
  port = 8888
  targetPort = 8080
  autoLaunch = false
